name: Daily Learning Log

on:
  schedule:
    # Runs every day at 6:00 AM UTC (11:30 AM IST)
    - cron: '0 6 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update learning log
        run: |
          echo "" >> learning-log.md
          echo "### $(date '+%Y-%m-%d')" >> learning-log.md
          echo "- Automated daily check-in at $(date '+%H:%M:%S UTC')" >> learning-log.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add learning-log.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: update daily learning log"
            git push
          fi